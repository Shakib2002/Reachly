<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reachly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
    .header { background: linear-gradient(135deg, #3b82f6, #6366f1); padding: 16px 20px; color: white; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .status { padding: 12px 20px; background: #f0fdf4; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
    .status.disconnected { background: #fef2f2; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .dot.off { background: #ef4444; }
    .status span { font-size: 11px; font-weight: 600; color: #374151; }
    .section { padding: 16px 20px; }
    .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .lead-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .lead-name { font-size: 13px; font-weight: 700; color: #1e293b; }
    .lead-info { font-size: 11px; color: #64748b; margin-top: 2px; }
    .lead-email { font-size: 11px; color: #3b82f6; font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; margin-top: 8px; }
    .btn-secondary:hover { background: #e2e8f0; }
    .input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; outline: none; margin-bottom: 8px; }
    .input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .badge-green { background: #f0fdf4; color: #16a34a; }
    .badge-blue { background: #eff6ff; color: #2563eb; }
    .footer { padding: 12px 20px; border-top: 1px solid #e2e8f0; text-align: center; }
    .footer a { font-size: 11px; color: #3b82f6; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Reachly</h1>
    <p>Prospect from any website</p>
  </div>

  <div class="status" id="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking connection...</span>
  </div>

  <div class="section">
    <div class="section-title">Quick Lookup</div>
    <input class="input" id="domain" placeholder="Enter domain (e.g. stripe.com)" />
    <input class="input" id="role" placeholder="Role (e.g. CTO, Head of Sales)" />
    <button class="btn btn-primary" id="searchBtn">🔍 Find Contacts</button>
  </div>

  <div class="section" id="results" style="display:none;">
    <div class="section-title">Contacts Found</div>
    <div id="contactList"></div>
  </div>

  <div class="section" id="linkedinSection" style="display:none;">
    <div class="section-title">LinkedIn Profile Detected</div>
    <div id="linkedinCard"></div>
    <button class="btn btn-primary" id="saveLeadBtn">💾 Save to Reachly CRM</button>
  </div>

  <div class="footer">
    <a href="http://localhost:3000/crm" target="_blank">Open Reachly Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
